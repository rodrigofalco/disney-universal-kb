<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Disney Universal KB</title>
  <meta name="description" content="Disney + Universal Orlando trip planning vault published from Obsidian markdown.">
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #192347;
      --text: #ebf0ff;
      --muted: #b4c0e8;
      --link: #8cc7ff;
      --border: #2c3b73;
      --accent: #6ee7b7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { color: var(--link); }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 18px;
      overflow: auto;
    }
    main {
      padding: 24px;
      overflow: auto;
    }
    h1,h2,h3 { line-height: 1.2; }
    .brand {
      margin-bottom: 16px;
    }
    .brand h1 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }
    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
    }
    input[type="search"] {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      margin: 14px 0 16px;
    }
    details {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.02);
      overflow: hidden;
    }
    summary {
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 600;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    .group { padding: 0 8px 8px; }
    .nav-link {
      display: block;
      padding: 8px 10px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: .95rem;
      word-break: break-word;
    }
    .nav-link:hover, .nav-link.active {
      background: var(--panel-2);
    }
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-block;
      background: rgba(110,231,183,.12);
      border: 1px solid rgba(110,231,183,.25);
      color: var(--accent);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .85rem;
    }
    article {
      max-width: 980px;
      line-height: 1.65;
    }
    article img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    article code {
      background: rgba(255,255,255,.08);
      padding: .15em .35em;
      border-radius: 6px;
    }
    article pre {
      background: #0a0f1e;
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 12px;
      overflow: auto;
    }
    .empty {
      color: var(--muted);
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--border); max-height: 42vh; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">
        <h1>Disney Universal KB</h1>
        <p>Public vault view for the Orlando trip knowledge base.</p>
      </div>
      <input id="search" type="search" placeholder="Search files..." aria-label="Search files">
      <nav id="nav"></nav>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <span class="pill">GitHub Pages</span>
        </div>
        <div>
          <a href="https://github.com/rodrigofalco/disney-universal-kb" target="_blank" rel="noreferrer">View repository</a>
        </div>
      </div>
      <article id="content">
        <p class="empty">Loading…</p>
      </article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const DEFAULT_FILE = 'Home.md';
    const navEl = document.getElementById('nav');
    const searchEl = document.getElementById('search');
    const contentEl = document.getElementById('content');
    let allFiles = [];

    function escapeHtml(str) {
      return str.replace(/[&<>\"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }

    function dirname(path) {
      const idx = path.lastIndexOf('/');
      return idx === -1 ? '' : path.slice(0, idx);
    }

    function normalizeParts(parts) {
      const out = [];
      for (const part of parts) {
        if (!part || part === '.') continue;
        if (part === '..') out.pop();
        else out.push(part);
      }
      return out;
    }

    function resolveLink(target, currentFile) {
      const [rawTarget, rawAlias] = target.split('|');
      const linkTarget = rawTarget.trim();
      const alias = (rawAlias || '').trim();
      const currentDir = dirname(currentFile);
      const candidates = [];

      function addCandidate(p) {
        if (!p) return;
        if (!candidates.includes(p)) candidates.push(p);
      }

      if (linkTarget.endsWith('.md')) {
        const parts = normalizeParts((currentDir ? currentDir + '/' : '') .concat(linkTarget).split('/'));
        addCandidate(parts.join('/'));
      } else {
        const relParts = normalizeParts((currentDir ? currentDir + '/' : '') .concat(linkTarget).split('/'));
        addCandidate(relParts.join('/') + '.md');
        addCandidate(relParts.join('/') + '/Overview.md');
        addCandidate(relParts.join('/') + '/Home.md');
        addCandidate(linkTarget + '.md');
        addCandidate(linkTarget + '/Overview.md');
        addCandidate(linkTarget + '/Home.md');
      }

      let resolved = candidates.find(c => allFiles.includes(c));
      if (!resolved) {
        const basename = linkTarget.split('/').pop();
        resolved = allFiles.find(f => f.endsWith('/' + basename + '.md') || f === basename + '.md');
      }
      return { resolved, label: alias || linkTarget.split('/').pop() };
    }

    function preprocessMarkdown(md, currentFile) {
      md = md.replace(/!\[\[([^\]]+)\]\]/g, (_m, inner) => {
        const target = inner.split('|')[0].trim();
        return `![](${encodeURI(target)})`;
      });

      md = md.replace(/\[\[([^\]]+)\]\]/g, (_m, inner) => {
        const { resolved, label } = resolveLink(inner, currentFile);
        if (!resolved) return label;
        return `[${label}](#${encodeURIComponent(resolved)})`;
      });

      return md;
    }

    function groupFiles(files) {
      const grouped = {};
      for (const file of files) {
        const key = file.includes('/') ? file.split('/')[0] : 'Root';
        (grouped[key] ||= []).push(file);
      }
      return grouped;
    }

    function renderNav(filter = '') {
      const files = allFiles.filter(f => !filter || f.toLowerCase().includes(filter.toLowerCase()));
      const groups = groupFiles(files);
      navEl.innerHTML = '';
      Object.keys(groups).sort().forEach(group => {
        const details = document.createElement('details');
        details.open = true;
        const summary = document.createElement('summary');
        summary.textContent = `${group} (${groups[group].length})`;
        details.appendChild(summary);
        const box = document.createElement('div');
        box.className = 'group';
        groups[group].sort().forEach(file => {
          const a = document.createElement('a');
          a.className = 'nav-link';
          a.href = `#${encodeURIComponent(file)}`;
          a.textContent = file;
          if (decodeURIComponent(location.hash.slice(1) || DEFAULT_FILE) === file) a.classList.add('active');
          box.appendChild(a);
        });
        details.appendChild(box);
        navEl.appendChild(details);
      });
      if (!files.length) navEl.innerHTML = '<p class="empty">No files match.</p>';
    }

    async function loadFile(file) {
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const processed = preprocessMarkdown(text, file);
        contentEl.innerHTML = marked.parse(processed);
        document.title = `${file} · Disney Universal KB`;
        document.querySelectorAll('.nav-link').forEach(el => el.classList.toggle('active', decodeURIComponent(el.getAttribute('href').slice(1)) === file));
      } catch (err) {
        contentEl.innerHTML = `<p>Could not load <code>${escapeHtml(file)}</code>.</p><pre>${escapeHtml(String(err))}</pre>`;
      }
    }

    async function init() {
      const res = await fetch('site-files.json');
      allFiles = await res.json();
      renderNav();
      const hashFile = decodeURIComponent(location.hash.slice(1) || DEFAULT_FILE);
      const target = allFiles.includes(hashFile) ? hashFile : DEFAULT_FILE;
      if (hashFile !== target) location.hash = encodeURIComponent(target);
      await loadFile(target);
    }

    searchEl.addEventListener('input', () => renderNav(searchEl.value));
    window.addEventListener('hashchange', () => {
      const file = decodeURIComponent(location.hash.slice(1) || DEFAULT_FILE);
      loadFile(allFiles.includes(file) ? file : DEFAULT_FILE);
      renderNav(searchEl.value);
    });

    marked.setOptions({ headerIds: true, mangle: false });
    init();
  </script>
</body>
</html>
